---

- name: Ensure Python3 and pip are installed
  apt:
    name:
      - python3
      - python3-pip
    state: present
    update_cache: yes

- name: Create a Python virtual environment in /opt/venv
  command: python3 -m venv /opt/venv
  args:
    creates: /opt/venv/bin/activate

- name: Ensure /opt/venv/bin/activate is sourced by default in all terminals
  lineinfile:
    path: /etc/profile.d/venv.sh
    line: 'source /opt/venv/bin/activate'
    create: yes
    mode: '0755'

- name: Upgrade pip in the virtual environment
  command: /opt/venv/bin/pip install --upgrade pip
