---
- name: Create backup directory if it doesn't exist
  file:
    path: "{{ backup_dir }}"
    state: directory
    mode: "0755"

- name: Ensure log directory exists
  file:
    path: "/var/log/backup"
    state: directory
    mode: "0755"

- name: Copy backup script to /usr/local/bin/backup-script.sh
  template:
    src: backup-script.sh.j2
    dest: /usr/local/bin/backup-script.sh
    mode: "0755"

- name: If backup_schedule is set, create cron job for backups, else remove existing cron job
  cron:
    name: "Automated Backup Job"
    minute: "{{ backup_schedule.split()[0] }}"
    hour: "{{ backup_schedule.split()[1] }}"
    day: "{{ backup_schedule.split()[2] }}"
    month: "{{ backup_schedule.split()[3] }}"
    weekday: "{{ backup_schedule.split()[4] }}"
    job: "/usr/local/bin/backup-script.sh >> /var/log/backup/backup.log 2>&1"
    state: "{{ 'present' if backup_schedule else 'absent' }}"