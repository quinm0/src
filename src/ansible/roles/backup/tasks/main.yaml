---
- name: Create backup directory if it doesn't exist
  file:
    path: "{{ backup_dir }}"
    state: directory
    mode: "0755"

- name: Ensure log directory exists
  file:
    path: "/var/log/backup"
    state: directory
    mode: "0755"

- name: Copy backup script to /usr/local/bin/backup-script.sh
  template:
    src: backup-script.sh
    dest: /etc/backup/bin/backup.sh
    mode: "0755"

- name: Ensure backup group exists
  group:
    name: backup
    state: present

- name: Set all files for values to be root:backup owned
  file:
    path: "{{ item }}"
    owner: root
    group: backup
    recurse: yes
  with_items:
    - "{{ backup_dir }}"
    - /var/log/backup

- name: Set paths in /etc/backup/paths.txt
  copy:
    content: |
      {% for path in backup_paths %}
      {{ path }}
      {% endfor %}
    dest: /etc/backup/paths.txt
    owner: root
    group: backup
    mode: "0640"

- name: If backup_schedule is set and not "off", create cron job for backups, else remove existing cron job
  cron:
    name: Backup script
    minute: "{{ backup_schedule.split()[0] }}"
    hour: "{{ backup_schedule.split()[1] }}"
    day: "{{ backup_schedule.split()[2] }}"
    month: "{{ backup_schedule.split()[3] }}"
    weekday: "{{ backup_schedule.split()[4] }}"
    job: "/etc/backup/bin/backup.sh"
    state: "{{ 'present' if backup_schedule and backup_schedule != 'off' else 'absent' }}"