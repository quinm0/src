---
- name: Ensure backup group exists
  group:
    name: backup
    state: present

- name: Create needed directories
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  with_items:
   - /etc/backup
   - /etc/backup/bin

- name: Create backup directory if it doesn't exist
  file:
    path: "{{ backup_dir }}"
    state: directory
    mode: "0755"

- name: Ensure log directory exists
  file:
    path: "/var/log/backup"
    state: directory
    mode: "0755"

- name: Set all files for values to be root:backup owned
  file:
    path: "{{ item }}"
    owner: root
    group: backup
    recurse: yes
  with_items:
    - /etc/backup
    - /var/log/backup
    - "{{ backup_dir }}"

- name: Set paths in /etc/backup/paths.txt
  copy:
    content: |
      {% for path in backup_paths %}
      {{ path }}
      {% endfor %}
    dest: /etc/backup/paths.txt
    owner: root
    group: backup
    mode: "0640"

- name: Copy backup script to /usr/local/bin/backup-script.sh
  template:
    src: backup-script.sh.j2
    dest: /etc/backup/bin/backup.sh
    mode: "0755"
    owner: root
    group: backup

- name: Write env secrets from vault
  # line in file make sure vault is set
  lineinfile:
   path: "{{ backup_env_path}}"
   regexp: "^BACKUP_ENCRYPTION_KEY="
   line: "BACKUP_ENCRYPTION_KEY={{ BACKUP_ENCRYPTION_KEY }}"
   state: present

