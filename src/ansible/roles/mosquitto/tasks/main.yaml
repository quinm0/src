- name: Create required directories
  file:
    path: "{{ item }}"
    state: directory
    mode: "0770"
  with_items:
    - /etc/mosquitto
    - /etc/mosquitto/config
    - /mnt/mount/mosquitto
    - /mnt/mount/mosquitto/data
    - /var/log/mosquitto

- name: Create config file for mosquitto
  copy:
    content: |
      listener 1883
      password_file /etc/mosquitto/password_file
      persistence true
      persistence_location /mosquitto/data/
      log_dest file /mosquitto/log/mosquitto.log
    dest: /etc/mosquitto/config/mosquitto.conf
    mode: "0644"

- name: Create password file for mosquitto
  copy:
    content: |
      root:{{ mosquitto_root_key }}
    dest: /etc/mosquitto/config/password_file
    mode: "0644"

- name: Copy docker compose file
  template:
    src: compose.yaml.j2
    dest: /etc/mosquitto/compose.yaml
    owner: root
    group: root
    mode: "0644"
