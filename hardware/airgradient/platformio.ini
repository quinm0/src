[env:d1_mini]
platform = espressif8266
board = d1_mini
framework = arduino
monitor_speed = 115200
lib_deps = 
	wnatth3/WiFiManager@^2.0.16-rc.2
	sensirion/Sensirion Core@^0.7.3
	sensirion/Sensirion UART SPS30@^1.0.0
	bblanchon/ArduinoJson@^7.4.3
	plerup/EspSoftwareSerial@^8.2.0
	olikraus/U8g2@^2.36.18
	sensirion/arduino-sht@^1.2.6
	airgradienthq/AirGradient Air Quality Sensor@2.4.15
	thingpulse/ESP8266 and ESP32 OLED driver for SSD1306 displays@^4.6.2
